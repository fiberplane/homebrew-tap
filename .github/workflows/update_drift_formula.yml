name: Update drift formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Drift release tag to sync (defaults to latest)"
        required: false
        type: string
  repository_dispatch:
    types: [drift-release]
  schedule:
    - cron: "23 5 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-14
    env:
      REQUESTED_VERSION: ${{ github.event.client_payload.version || inputs.version }}
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Update formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby script/update_drift_formula.rb "${REQUESTED_VERSION}"

      - name: Link checkout into Homebrew tap path
        run: |
          BREW_REPO="$(brew --repository)"
          mkdir -p "$BREW_REPO/Library/Taps/fiberplane"
          ln -sfn "$GITHUB_WORKSPACE" "$BREW_REPO/Library/Taps/fiberplane/homebrew-tap"

      - name: Read formula version
        id: formula
        run: |
          echo "version=$(ruby -e 'puts File.read("Formula/drift.rb")[%r{releases/download/v([^/]+)/}, 1]')" >> "$GITHUB_OUTPUT"

      - name: Audit formula
        run: brew audit --strict --online fiberplane/tap/drift

      - name: Commit and push
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          command git add Formula/drift.rb
          command git diff --staged --quiet && echo "No changes" && exit 0
          command git commit -m "chore: update drift formula to v${{ steps.formula.outputs.version }}"
          command git push
