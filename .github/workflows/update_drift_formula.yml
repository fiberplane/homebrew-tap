name: Update drift formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Drift release tag to sync (defaults to latest)"
        required: false
        type: string
  repository_dispatch:
    types: [drift-release]
  schedule:
    - cron: "23 5 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-14
    env:
      REQUESTED_VERSION: ${{ github.event.client_payload.version || inputs.version }}
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Update formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby script/update_drift_formula.rb "${REQUESTED_VERSION}"

      - name: Link checkout into Homebrew tap path
        run: |
          BREW_REPO="$(brew --repository)"
          mkdir -p "$BREW_REPO/Library/Taps/fiberplane"
          ln -sfn "$GITHUB_WORKSPACE" "$BREW_REPO/Library/Taps/fiberplane/homebrew-tap"

      - name: Read formula version
        id: formula
        run: |
          echo "version=$(ruby -e 'puts File.read("Formula/drift.rb")[%r{releases/download/v([^/]+)/}, 1]')" >> "$GITHUB_OUTPUT"

      - name: Audit formula
        run: brew audit --strict --online fiberplane/tap/drift

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-drift-formula
          delete-branch: true
          commit-message: "chore: update drift formula to v${{ steps.formula.outputs.version }}"
          title: "chore: update drift formula to v${{ steps.formula.outputs.version }}"
          body: |
            Syncs `Formula/drift.rb` with the latest `fiberplane/drift` release metadata.

            - generated by `script/update_drift_formula.rb`
            - source of truth: GitHub Releases asset names + SHA-256 digests
          labels: |
            dependencies
